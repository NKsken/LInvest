<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = 'stylesheet' href = 'style.css'>
</head>
<body>
    <div id = 'wrap'>
        <div id = "header">
            <h1 class = 'logo'>
                <a href = "#">LInvest</a>
            </h1>
            <nav class = 'nav'>
                <ul>
                    <li><a href = "#">메뉴1</a></li>
                    <li><a href = "#">메뉴2</a></li>
                    <li><a href = "#">메뉴3</a></li>
                    <li><a href = "#">메뉴4</a></li>
                </ul>
            </nav>
            <!-- header -->
        </div>

        <div id = 'section-wrap'>
            <div id = 'left-section'>
                <div class = 'chart'>
                <!-- TradingView Widget BEGIN -->
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%"></div>
                <div class="tradingview-widget-copyright"><a href="https://kr.tradingview.com/symbols/KRX-005930/" rel="noopener nofollow" target="_blank"><span class="blue-text">Track all markets on TradingView</span></a></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                {
                "allow_symbol_change": true,
                "calendar": false,
                "details": false,
                "hide_side_toolbar": true,
                "hide_top_toolbar": false,
                "hide_legend": false,
                "hide_volume": false,
                "hotlist": false,
                "interval": "5",
                "locale": "kr",
                "save_image": true,
                "style": "1",
                "symbol": "KRX:005930",
                "theme": "dark",
                "timezone": "Etc/UTC",
                "backgroundColor": "#0F0F0F",
                "gridColor": "rgba(242, 242, 242, 0.06)",
                "watchlist": [],
                "withdateranges": false,
                "compareSymbols": [],
                "studies": [],
                "autosize": true
                }
                </script>
                </div>
                <!-- TradingView Widget END -->
                </div>
            </div>
            <div id = 'right-section'>
                <div class = 'predict'>
                    예측 섹션
                </div>
                    <div class = 'news'>
                    뉴스 섹션
                    </div>
            </div>
        </div>
    </div>
</body>
</html>
