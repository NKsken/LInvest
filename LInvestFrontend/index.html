<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL Invest</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
    <div id = "wrap">
        <div id = "header">
            <h1 class = 'logo'>
                <a href = "{{url_for('index')}}">ESL Invest</a>
            </h1>
            <nav class = 'nav'>
                <ul>
                    <li><a href = "#">메뉴1</a></li>
                </ul>
            </nav>
            <div class="search-box">
                <div class="search-container">
                    <form action="/search" method="get" class="search-box" autocomplete="off">
                        <input type="text" name="query" id="stockInput" placeholder="종목명 또는 코드 입력" required>
                    </form>
                    <div id="autocomplete-list" class="autocomplete-items"></div>
                </div>
            </div>
        </div>
            <!-- header -->
        <main class = "body">
            <div class = "status-wrap">
                <div id = "status" class = "online-status">
                장 상태 확인
                </div>
            </div>
            <div class = "index-wrap">
                <div class = "index">
                    <div id = "index-kospi">KSP01</div>
                    <div id = "index-kosdaq">KSP02</div>
                </div>
            </div>
            <div class = "interested">
                내 관심 종목
            </div>
        </main>

        <script>
            // 파이썬 딕셔너리를 JS 객체로 변환
            const stockData = {{ stock_names | tojson | safe }};
        </script>
        <script src="{{ url_for('static', filename='js/SearchBox.js') }}"></script>
        <script src="{{ url_for('static', filename='js/MarketStatus.js') }}"></script>
    </div>
</body>
</html>
