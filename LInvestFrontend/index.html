<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL Invest</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
    <div id = "wrap">
        <div id = "header">
            <h1 class = 'logo'>
                <a href = "{{url_for('index')}}"><p id = "logo-text">ESL Invest</p></a>
            </h1>
            <nav class = 'nav'>
                <ul>
                    <li><a id = "how-to-use" href = "#">사용 방법</a></li>
                </ul>
            </nav>
            <div class="search-box">
                <div class="search-container">
                    <form action="/search" method="get" class="search-box" autocomplete="off">
                        <input type="text" name="query" id="stockInput" placeholder="종목명 또는 코드 입력" required>
                    </form>
                    <div id="autocomplete-list" class="autocomplete-items"></div>
                </div>
            </div>
            <div class="header-right">
                <div class="theme-switch-wrapper">
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" onclick="toggleTheme()" />
                        <div class="slider round"></div>
                    </label>
                    <span id="theme-icon">모드 표시</span>
                </div>
            </div>
        </div>
            <!-- header -->
        <main class = "body">
            <div class = "status-wrap">
                <div id = "status" class = "online-status">
                장 상태 확인
                </div>
            </div>
            <div class = "index-wrap">
                <div class = "index">
                    <div id = "index-kospi">KSP01</div>
                    <div id = "index-kosdaq">KSP02</div>
                </div>
            </div>
            <div class="wishlist-section">
                <h2 class="section-title">관심 종목</h2>
                <div id="wishlist-container">
                    <table class="wishlist-table">
                        <thead>
                            <tr>
                                <th>종목명</th>
                                <th>종목코드</th>
                                <th>현재가</th>
                                <th>내가 구매한 가격</th>
                                <th>수정</th>
                                <th>삭제</th>
                            </tr>
                        </thead>
                        <tbody id="wishlist-body">
                            <tr><td colspan="6" class="empty-msg">데이터를 불러오는 중...</td></tr>
                        </tbody>
                    </table>
                    </div>
            </div>
        </main>

        <script>
            // 파이썬 딕셔너리를 JS 객체로 변환
            const stockData = {{ stock_names | tojson | safe }};
        </script>
        <script src="{{ url_for('static', filename='JS/SearchBox.js') }}"></script>
        <script src="{{ url_for('static', filename='JS/MarketStatus.js') }}"></script>
        <script src="{{ url_for('static', filename='JS/MainWishList.js') }}"></script>
        <script src="{{ url_for('static', filename='JS/Theme.js') }}"></script>
    </div>
</body>
</html>
