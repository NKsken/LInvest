<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL Invest</title>
    <link rel='stylesheet' href='index.css'>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='js/SearchBox.js') }}">
</head>
<body>
    <div id = "wrap">
        <div id = "header">
            <h1 class = 'logo'>
                <a href = "#">LInvest</a>
            </h1>
            <nav class = 'nav'>
                <ul>
                    <li><a href = "#">메뉴1</a></li>
                    <li><a href = "#">메뉴2</a></li>
                    <li><a href = "#">메뉴3</a></li>
                    <li><a href = "#">메뉴4</a></li>
                </ul>
            </nav>
            <div class="search-box">
                <form action="/search" method="get" class="search-box" autocomplete="off">
                    <input type="text" name="query" id="stockInput" list="stockOptions" placeholder="종목명 또는 코드">
                    <datalist id="stockOptions">
                        {% for name in stock_names %}<option value="{{ name }}">{% endfor %}
                    </datalist>
                </form>
            </div>
            <!-- header -->
    </div>
</body>
</html>
